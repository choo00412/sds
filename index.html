<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>큐넷 결과확인</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 960px;
            background-color: #ffffff;
            padding: 24px;
            border: 1px solid #dcdcdc;
        }

        h2 {
            font-size: 24px;
            font-weight: bold;
            color: #000;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        /* 상단 헤더 영역 스타일 */
        .table-header-box {
            width: 100%;
            border-bottom: 1px solid #000000;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .notice {
            font-size: 12.5px;
            color: #444;
            text-align: right;
            margin-bottom: 10px;
            white-space: nowrap;
        }

        .exam-title {
            font-size: 13.5px;
            font-weight: bold;
            color: #000;
            text-align: left;
            white-space: nowrap;
        }

        /* 메인 테이블 스타일 */
        .main-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: center;
            border-top: 1px solid #000000;
            border-bottom: 1px solid #b5b5b5;
        }

        /* 공통 헤더 스타일 */
        .main-table th {
            background-color: #e8eef7;
            color: #000;
            font-weight: bold;
            padding: 10px 5px;
            border-bottom: 1px solid #ccc;
            border-right: 1px solid #ccc;
        }

        /* 공통 데이터 칸 스타일 */
        .main-table td {
            padding: 14px 5px;
            border-bottom: 1px solid #e1e1e1;
            border-right: 1px solid #e1e1e1;
            color: #333;
            vertical-align: middle;
            background-color: #fff;
        }

        /* 테이블 가장 오른쪽 테두리 제거 */
        .main-table th:last-child,
        .main-table td:last-child {
            border-right: none;
        }

        /* 하단 결과 바 스타일 */
        .result-bar td {
            background-color: #e8eef7;
            color: #000;
            font-weight: bold;
            border-bottom: none;
            padding: 12px 5px;
        }

        .pass-text {
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>결과확인</h2>
    
    <div class="table-header-box">
        <div class="notice">수험번호, 이름, 종목(자격), 합격여부, 과목, 득점 항목 순으로 결과확인</div>
        <div class="exam-title">2026년 정기 기사 1회 (필기) - 정보처리기사</div>
    </div>

    <table class="main-table">
        <thead>
            <tr>
                <th style="width: 15%;">수험번호</th>
                <th style="width: 12%;">이름</th>
                <th style="width: 20%;">종목(자격)</th>
                <th style="width: 15%;">합격여부</th>
                <th style="width: 26%;">과목</th>
                <th style="width: 12%;">취득득점</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="5">10204036</td>
                <td rowspan="5">추승연</td>
                <td rowspan="5">정보처리기사</td>
                <td rowspan="5" class="pass-text">불합격</td>
                <td>소프트웨어설계</td>
                <td>70</td>
            </tr>
            <tr>
                <td>소프트웨어개발</td>
                <td>65</td>
            </tr>
            <tr>
                <td>데이터베이스구축</td>
                <td>55</td>
            </tr>
            <tr>
                <td>프로그래밍언어활용</td>
                <td>55</td>
            </tr>
            <tr>
                <td>정보시스템구축관리</td>
                <td>45</td>
            </tr>
            
            <tr class="result-bar">
                <td colspan="3">평균</td>
                <td>58</td>
                <td>총점</td>
                <td>290</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
