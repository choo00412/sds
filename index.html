<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>큐넷 실기 결과확인</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 960px;
            background-color: #ffffff;
            padding: 24px;
            border: 1px solid #dcdcdc;
        }

        h2 {
            font-size: 24px;
            font-weight: bold;
            color: #000;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        /* 실기 상단 타이틀 영역 */
        .table-header-box {
            width: 100%;
            border-bottom: 1px solid #000000;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .exam-title {
            font-size: 13.5px;
            font-weight: bold;
            color: #000;
            text-align: left;
            white-space: nowrap;
        }

        /* 메인 테이블 스타일 */
        .main-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: center;
            border-top: 1px solid #000000;
            border-bottom: 1px solid #b5b5b5;
        }

        /* 공통 헤더 스타일 */
        .main-table th {
            background-color: #e8eef7;
            color: #000;
            font-weight: bold;
            padding: 10px 5px;
            border-bottom: 1px solid #ccc;
            border-right: 1px solid #ccc;
        }

        /* 공통 데이터 칸 스타일 */
        .main-table td {
            padding: 14px 5px;
            border-bottom: 1px solid #e1e1e1;
            border-right: 1px solid #e1e1e1;
            color: #333;
            vertical-align: middle;
            background-color: #fff;
        }

        /* 테이블 가장 오른쪽 테두리 제거 */
        .main-table th:last-child,
        .main-table td:last-child {
            border-right: none;
        }

        /* 실기 하단 총점 행 스타일 */
        .total-row td {
            border-bottom: none;
        }

        .pass-text {
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>정처기 실기 점수</h2>
    
    <div class="table-header-box">
        <div class="exam-title">2026년 정기 기사 1회 (실기) - 정보처리기사</div>
    </div>

    <table class="main-table">
        <thead>
            <tr>
                <th style="width: 15%;">수험번호</th>
                <th style="width: 15%;">이름</th>
                <th style="width: 22%;">종목(자격)</th>
                <th style="width: 16%;">구분</th>
                <th style="width: 16%;">점수</th>
                <th style="width: 16%;">합격여부</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">10204036</td>
                <td rowspan="2">추승연</td>
                <td rowspan="2">정보처리기사</td>
                <td>필답형</td>
                <td>55</td>
                <td rowspan="2" class="pass-text">불합격</td>
            </tr>
            <tr class="total-row">
                <td style="font-weight: bold;">총점</td>
                <td style="font-weight: bold;">55</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
